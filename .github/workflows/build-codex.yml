name: Build Codex

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'template.html'
      - 'build.py'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Codex
        run: python build.py

      - name: Verify build
        run: |
          HTML_SIZE=$(wc -c < dist/hive_codex.html)
          echo "HTML size: $HTML_SIZE bytes ($(echo "scale=1; $HTML_SIZE / 1048576" | bc) MB)"
          echo "Image files:"
          ls -lh dist/images/ 2>/dev/null || echo "  (no images directory)"
          TOTAL_DIST=$(du -sh dist/ | cut -f1)
          echo "Total dist size: $TOTAL_DIST"
          # Verify no single file exceeds 100 MB
          LARGE_FILES=$(find dist/ -type f -size +100M 2>/dev/null)
          if [ -n "$LARGE_FILES" ]; then
            echo "ERROR: Files exceeding 100 MB GitHub limit:"
            echo "$LARGE_FILES"
            exit 1
          fi
          echo "All files under 100 MB limit ✓"
          # Verify div balance
          OPEN=$(grep -o '<div' dist/hive_codex.html | wc -l)
          CLOSE=$(grep -o '</div>' dist/hive_codex.html | wc -l)
          echo "Div balance: $OPEN opening, $CLOSE closing"
          if [ "$OPEN" -ne "$CLOSE" ]; then
            echo "ERROR: Div imbalance!"
            exit 1
          fi

      - name: Prepare for GitHub Pages
        run: cp dist/hive_codex.html dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
